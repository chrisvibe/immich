#
# WARNING: To install Immich, follow our guide: https://docs.immich.app/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.

# TODO fix name + add volume of db in NAS + standardize across services path NAS convention. Add all NAS stuff to override
name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - immich_upload:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      DB_STORAGE_TYPE: 'HDD'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always

  # Automated backup sidecar (standardized across services; see also services/parvis, matrix, nextcloud).
  # immich's photos already live on the NAS (immich_upload) and model-cache is reproducible, so the only
  # LOCAL non-reproducible datastore is the Postgres DB. backup.sh delegates to backup_db.sh, which uses
  # pg_dumpall (NOT a custom-format dump) so the VectorChord / pgvecto.rs vector types restore cleanly.
  # Runs once at startup, then on BACKUP_CRON_SCHEDULE via dcron. Dumps land on the immich_backups volume
  # (NAS-backed via overrides/immich.override.yaml).
  # Manual ops:
  #   docker compose exec backup /scripts/backup.sh                # back up now
  #   docker compose exec backup ls -lh /backups/                  # list dumps
  #   docker compose exec backup /scripts/restore_db.sh /backups/immich_db_YYYY-MM-DD_HH-MM-SS.sql.gz
  #   (stop immich-server + machine-learning before a restore; start them after)
  backup:
    # Must match the vchord server Postgres MAJOR (PG14) so pg_dumpall round-trips (see BUG-1).
    image: postgres:${POSTGRES_VERSION:-14-alpine}
    container_name: immich-backup
    restart: unless-stopped
    depends_on:
      - database
    environment:
      - SERVICE_NAME=immich
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_CRON_SCHEDULE=${BACKUP_CRON_SCHEDULE:-0 3 * * *}
    volumes:
      - immich_backups:/backups
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/backup-entrypoint.sh"]

volumes:
  model-cache:
  immich_upload:
    driver: local
    driver_opts:
      type: nfs
      o: ${NFS_OPTIONS}
      device: ${UPLOAD_LOCATION}
  # Base: plain local volume so immich runs standalone. The infra override swaps this
  # to an NFS mount on the NAS (see overrides/immich.override.yaml).
  immich_backups:
    name: immich_backups
